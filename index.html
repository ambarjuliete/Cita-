<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tengo una pregunta... 🌸</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffeef2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 10px 25px rgba(255, 105, 180, 0.2);
            width: 85%;
            max-width: 350px;
            box-sizing: border-box;
        }

        h1 {
            color: #ff4a7d;
            font-size: 1.8rem;
            margin-bottom: 30px;
        }

        /* Contenedor de botones flexible para que nunca se crucen al inicio */
        .buttons-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            min-height: 80px;
        }

        button {
            padding: 12px 25px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        #yes-btn {
            background-color: #4caf50;
            color: white;
            z-index: 10;
        }

        /* El botón NO empieza estático en su lugar y solo se vuelve absoluto al tocarlo */
        #no-btn {
            background-color: #f44336;
            color: white;
            transition: all 0.1s ease;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="container" id="quiz-container">
        <h1 id="question">¿Quieres salir conmigo? 🌤️✨</h1>
        <div class="buttons-wrapper">
            <button id="yes-btn" onclick="accepted()">¡Sí!</button>
            <button id="no-btn" onmouseover="moveButton()" onclick="moveButton()" ontouchstart="moveButton()">No</button>
        </div>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('no-btn');
            
            // Cambia la posición a absoluta solo cuando se interactúa con él
            noBtn.style.position = 'absolute';
            
            // Límites para que no se salga de la pantalla del celular
            const maxX = window.innerWidth - noBtn.offsetWidth - 20;
            const maxY = window.innerHeight - noBtn.offsetHeight - 20;
            
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function accepted() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = `
                <h1 style="font-size: 2.2rem; color: #ff4a7d;">¡Siií! 🎉🥳</h1>
                <p style="font-size: 1.1rem; color: #555;">¡Ya es una cita! Te mando mensaje para ponernos de acuerdo. 🥰✨</p>
                <div style="font-size: 3rem; margin-top: 20px;">💐💖</div>
            `;
        }
    </script>

</body>
</html>
