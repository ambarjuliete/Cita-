<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tengo una pregunta... 🌸</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffeef2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 10px 25px rgba(255, 105, 180, 0.2);
            width: 85%;
            max-width: 350px;
            box-sizing: border-box;
        }

        h1 {
            color: #ff4a7d;
            font-size: 1.8rem;
            margin-bottom: 30px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            height: 60px;
            position: relative;
        }

        button {
            padding: 12px 25px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            height: 50px;
        }

        #yes-btn {
            background-color: #4caf50;
            color: white;
        }

        #no-btn {
            background-color: #f44336;
            color: white;
            position: absolute;
        }
    </style>
</head>
<body>

    <div class="container" id="quiz-container">
        <h1 id="question">¿Quieres salir conmigo? 🌤️✨</h1>
        <div class="buttons">
            <button id="yes-btn" onclick="accepted()">¡Sí!</button>
            <button id="no-btn" onmouseover="moveButton()" onclick="moveButton()">No</button>
        </div>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('no-btn');
            
            // Calcula posiciones aleatorias seguras dentro de la pantalla del cel
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 30);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 30);
            
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function accepted() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = `
                <h1 style="font-size: 2.2rem; color: #ff4a7d;">¡Siií! 🎉🥳</h1>
                <p style="font-size: 1.1rem; color: #555;">¡Ya es una cita! Te mando mensaje para ponernos de acuerdo. 🥰✨</p>
                <div style="font-size: 3rem; margin-top: 20px;">💐💖</div>
            `;
        }
    </script>

</body>
</html>
